# vim:fileencoding=utf-8:ft=kitty

# ──────────────────────────────
# 🎨 Theme Initialization
# ──────────────────────────────
# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME

# ──────────────────────────────
# 🧩 Performance & Rendering
# ──────────────────────────────
# NOTE: "enable_gpu" is a deprecated option; Kitty always utilizes the GPU natively.
sync_to_monitor yes
repaint_delay 8
input_delay 2

# ──────────────────────────────
# 🖋 Font Configuration
# ──────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Typographical adjustments (uncomment if lines feel too tight or loose)
# modify_font cell_height +2px
# modify_font cell_width 0px

# Ligatures (Cleaned up syntax)
disable_ligatures always

# ──────────────────────────────
# ⌨️ Cursor & Input Behavior
# ──────────────────────────────
cursor_shape block
cursor_blink_interval 0
mouse_hide_wait 2.0
touch_scroll_multiplier 1.0
copy_on_select yes
select_by_word_characters @-./_~?&=%+#a

# ──────────────────────────────
# 📜 Scrolling
# ──────────────────────────────
scrollback_lines 5000
strip_trailing_spaces smart

# ──────────────────────────────
# 🪟 Window & UI Layout
# ──────────────────────────────
remember_window_size yes
window_border_width 1pt
draw_minimal_borders yes
hide_window_decorations no
background_opacity 0.8
inactive_text_alpha 0.85
confirm_os_window_close 0

# Visual feedback tweaks
visual_bell_duration 0.0
window_alert_on_bell no

# ──────────────────────────────
# 🧭 Tabs (Powerline Optimized)
# ──────────────────────────────
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style angled
tab_title_template "{index}: {title}"
tab_title_max_length 25

# Keymaps for tab navigation
map ctrl+shift+h previous_tab
map ctrl+shift+l next_tab

# ──────────────────────────────
# 📋 Clipboard & Shell Integration
# ──────────────────────────────
clipboard_control write-clipboard write-primary read-clipboard
allow_remote_control no
shell_integration no-cursor

# ──────────────────────────────
# 🌐 URL Handling
# ──────────────────────────────
detect_urls yes
url_style curly
