corner-radius = 0;

rounded-corners-exclude = [
# "window_type = 'normal'",
# "window_type = 'dock'",
"window_type = 'desktop'",
# "class_g ?= 'rofi'",
# "class_g ?= 'polybar'",
# "class_g ?= 'tint2'"
];
round-borders = 1;

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.25;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'slop'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];
# shadow-exclude = [
#	"class_g = 'Cairo-clock'",
#	"class_g = 'CoverGloobus'",
#	"class_g = 'Tilda'",
#	"name ?= 'gnome-pie'",
#	"class_g = 'Dmenu'",
#	"class_g ?= 'rofi'",
#	"class_g ?= 'polybar'",
#    "class_g ?= 'Plank'",
#   "name *= 'recordmydesktop'",
#    "name = 'Notification'",
#    "name = 'Docky'",
#    "name = 'Kupfer'",
#    "name = 'xfce4-notifyd'",
#   "name *= 'VLC'",
#    "name *= 'Chromium'",
#    "name *= 'Chrome'",
#    "class_g = 'Conky'",
#    "class_g = 'Kupfer'",
#    "class_g = 'Synapse'",
#    "class_g ?= 'Notify-osd'",
#    "class_g ?= 'Cairo-dock'",
#    "class_g ?= 'Xfce4-notifyd'",
#    "class_g ?= 'Xfce4-power-manager'",
#    "_GTK_FRAME_EXTENTS@:c",
#    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
#];

fading =false ;

# fade-in-step = 0.015;

# fade-out-step = 0.03;

# fade-delta = 5

fade-exclude = [
  "class_g = 'slop'"   # maim
]

inactive-opacity = 0.8;

frame-opacity = 1.0;
inactive-opacity-override = false;

active-opacity = 1.0
focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g = 'Bar'",                    # lemonbar
  "class_g = 'slop'"                    # maim
];

opacity-rule = [
  "100:class_g    = 'Bar'",             # lemonbar
  "100:class_g    = 'slop'",            # maim
  "100:class_g    = 'XTerm'",
  "100:class_g    = 'URxvt'",
  "80:class_g    = 'kitty'",
  "80:class_g    = 'kitty-float'",
  "80:class_g    = 'kitty-fullscreen'",
  "80:class_g    = 'Alacritty'",
  "80:class_g    = 'Polybar'",
  "100:class_g    = 'code-oss'",
  "80:class_g    = 'Spotify'",
  "80:class_g    = 'Code'",
  "100:class_g    = 'Meld'",
  "100:class_g    = 'TelegramDesktop'",
  "100:class_g    = 'Joplin'",
   "80:class_g    = 'Thunar'",
   "80:class_g    = 'Geany'",
  "100:class_g    = 'firefox'",
  "95:class_g    = 'Thorium-browser'",
  "100:class_g    = 'Thunderbird'",
];

blur: {
  # requires: https://github.com/ibhagwan/picom
  method = "dual_kawase";
  # method = "kernel";
  strength = 2;
  deviation =0.6;
  # kernel = "11x11gaussian";
  background = true;
  background-frame = true;
  background-fixed = false;
  kern = "3x3box";
}
animations=true;
fade-delta=10;
blur-background-exclude = [
#	"window_type = 'dock'",
	"window_type = 'desktop'",
	"class_g = 'Plank'",
	"class_g = 'slop'",
	"_GTK_FRAME_EXTENTS@:c"
];

experimental-backends=false;
backend = "glx";

vsync = true;

mark-wmwin-focused = true;

mark-ovredir-focused = true;

detect-rounded-corners = true;

detect-client-opacity = true;

use-ewmh-active-win = true

detect-transient = true;

glx-no-stencil = true;

use-damage = false;

log-level = "warn";

wintypes:
{
  tooltip = { fade=true; shadow=true; opacity=0.95; focus=true; full-shadow=false; };
  popup_menu = { opacity=1.0; }
  dropdown_menu = { opacity=1.0; }
  utility = { shadow=false; opacity=1.0; }
  dock = { shadow=true; clip-shadow-above=true; }
  dnd = { shadow=true; }
};
